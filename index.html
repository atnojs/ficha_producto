<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ficha de Producto</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="https://www.atnojs.es/imagenes/favicon_negro1.ico" type="image/x-icon">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="app.css">
</head>
<body class="font-sans antialiased">
  <div id="root"></div>

  <!-- JSZip UMD antes de Babel y de tu app -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>window.JSZip = window.JSZip || JSZip;</script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel para compilar app.js tipo "text/babel" -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- Tu app -->
  <script type="text/babel" src="app.js" data-presets="react"></script>
</body>
</html>
